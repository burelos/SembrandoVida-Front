<div class="flex items-center justify-center py-14">
    <div class="w-xl p-4 sm:p-6 md:p-8 mr-9">
        <form class="space-y-6" action="#">
            <h5 class="text-3xl font-medium text-gray-900 dark:text-white">Iniciar Sesión</h5>
            <div>
                <label for="email" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Correo
                    Electrónico:</label>
                <input type="email" name="email" id="email" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg 
                focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-600 dark:border-gray-500 
                dark:placeholder-gray-400 dark:text-white" placeholder="Correo Electrónico" />
            </div>
            <div>
                <label for="password"
                    class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Contraseña:</label>
                <input type="password" name="password" id="password" placeholder="••••••••" class="bg-gray-50 border border-gray-300 
                text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-600 
                dark:border-gray-500 dark:placeholder-gray-400 dark:text-white" />
            </div>
            <div class="flex items-start">
                <button routerLink="" class="ms-auto text-sm cursor-pointer text-white dark:text-blue-500 bg-[#BC955B] 
                hover:bg-[#b48c50] rounded-sm p-2">¿Olvidó su contraseña?
                </button>
            </div>

            <h1>*Aqui va el recapcha</h1>

            <button type="submit" routerLink="/dashboard"
                class="w-full text-white bg-[#9D2449] hover:bg-[#971647] cursor-pointer focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium 
            rounded-lg text-sm px-5 py-2.5 text-center dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800">Acceder</button>
        </form>
    </div>

    <!-- Card Sistema de asistencia y logo tabasco-->
    <div class="w-xl bg-white border border-gray-200 rounded-lg shadow-sm dark:bg-gray-800 dark:border-gray-700">

        <div class="bg-[#9D2449] text-white rounded-t-lg p-4">
            <h1 class="text-lg font-bold text-center text-white">SISTEMA DE PRUEBAS</h1>
        </div>


        <div class="p-6 flex flex-col items-center">
            <img src="assets/images/logoTabasco.png" alt="Escudo Tabasco" class="mx-auto">
        </div>
    </div>

</div>
